name: Run Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Spec file yang mau dijalankan"
        required: false
        default: ""
  schedule:
    - cron: "0 23 * * *"

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependecies
        run: npm install

      - name: Install Playwright Browser
        run: npx playwright install chromium

      - name: Set Timezone to WIB
        run: sudo timedatectl set-timezone Asia/Jakarta

      - name: Run tests
        id: run_tests
        run: |
          if [ -z "${{ github.event.inputs.test_file }}" ]; then
            echo "Running all tests..."
            npx playwright test --project=chromium || true
            echo "Done running all tests"
          else
            echo "Running test file: ${{ github.event.inputs.test_file }}"
            npx playwright test ./tests/${{ github.event.inputs.test_file }} --project=chromium || true
            echo "Done running specific test: ${{ github.event.inputs.test_file }}"
          fi
        continue-on-error: true
        env:
          DAYTRANS_USERNAME: ${{ secrets.DAYTRANS_USERNAME }}
          DAYTRANS_PASSWORD: ${{ secrets.DAYTRANS_PASSWORD }}
          BARAYA_USERNAME: ${{ secrets.BARAYA_USERNAME }}
          BARAYA_PASSWORD: ${{ secrets.BARAYA_PASSWORD }}
          ARAGON_USERNAME: ${{ secrets.ARAGON_USERNAME }}
          ARAGON_PASSWORD: ${{ secrets.ARAGON_PASSWORD }}
          JACKAL_USERNAME: ${{ secrets.JACKAL_USERNAME }}
          JACKAL_PASSWORD: ${{ secrets.JACKAL_PASSWORD }}
          BTM_USERNAME: ${{ secrets.BTM_USERNAME }}
          BTM_PASSWORD: ${{ secrets.BTM_PASSWORD }}
          KRUZZ_USERNAME: ${{ secrets.KRUZZ_USERNAME }}
          KRUZZ_PASSWORD: ${{ secrets.KRUZZ_PASSWORD }}

      - name: Build Telegram Report
        run: |
          node <<'EOF'
          const fs = require('fs');

          function formatDuration(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds & 60;

            return [
              String(hours).padStart(2, '0'),
              String(minutes).padStart(2, '0'),
              String(seconds).padStart(2, '0'),
            ].join(':');
          }

          const data = JSON.parse(fs.readFileSync('result.json', 'utf8'));
          
          console.log("=== FULL DATA ===");
          console.log(JSON.stringify(data, null, 2));
          
          const suites = data.suites || [];
          const stats = data.stats || {};

          const executionTime = stats.startTime ? new Date(stats.startTime) : new Date();
          const duration = stats.duration || 0;
          const durationFormatted = formatDuration(duration);

          const date = executionTime.toLocaleDateString('id-ID');
          const time = executionTime.toLocaleTimeString('id-ID', { hour12: false });

          let total = 0;
          let passed = 0;
          let failed = 0;
          let detail = '';

          suites.forEach(suite => {
            if (!suite.file) return;

            detail += `📁 File: ${suite.file}\n`;

            (suite.specs || []).forEach(spec => {
              (spec.tests || []).forEach(test => {
                (test.results || []).forEach(result => {
                  const status = result.status || 'unknown';
                  
                  total++;
                  if (status === 'passed') passed++;
                  else failed++;

                  detail += `  • ${spec.title} — [ ${status} ]\n`;
                });
              });
            });

            detail += '\n';
          });

          const report =
            `AUTOMATE TEST ASMAT REPORT

             📅 Date: ${date} 
             🕒 Time: ${time}
              ⏱ Duration: ${durationFormatted} ms

             Summary
             🧪 Total: ${total}
             ✅ Passed: ${passed}
             ❌ Failed: ${failed}

             Detail
             ${detail}`;

          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `TELEGRAM_REPORT<<EOF\n${report}\nEOF\n`
          );
          EOF

      - name: Send Telegram Notification
        if: always()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            --data-urlencode "text=$TELEGRAM_REPORT"
